services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sisdp-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - sisdp-network

  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - sisdp-network

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-vanlim73_sisdp}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-sisdp_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3308:3306"
    volumes:
      - dbdata:/var/lib/mysql
      - ./vanlim73_sisdp.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - sisdp-network

networks:
  sisdp-network:
    driver: bridge

volumes:
  dbdata:
