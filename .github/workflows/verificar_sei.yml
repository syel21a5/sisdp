name: Verificar SEI
on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'ID do Job'
        required: true
      callback_url:
        description: 'URL de Callback'
        required: true
      action:
        description: 'Ação a executar'
        required: true
      config_b64:
        description: 'Configuração em base64'
        required: true
      base_url:
        description: 'URL do SEI'
        required: true

jobs:
  run-playwright:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install chromium

      - name: Decode Config and Run
        run: |
          echo "${{ github.event.inputs.config_b64 }}" | base64 --decode > config.json
          python scripts/python/verificar_sei.py \
            --action "${{ github.event.inputs.action }}" \
            --base_url "${{ github.event.inputs.base_url }}" \
            --config config.json \
            --job_id "${{ github.event.inputs.job_id }}" \
            --callback_url "${{ github.event.inputs.callback_url }}" \
            --output_dir output_docs
